server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            # USUARIO SERVICE
            - id: usuario-service
              uri: lb://USUARIO-SERVICE
              predicates:
                - Path=/api/usuarios/**

            # RESTAURANTE SERVICE
            - id: restaurante-service
              uri: lb://RESTAURANTE-SERVICE
              predicates:
                - Path=/api/restaurantes/**

            # PEDIDO SERVICE
            - id: pedido-service
              uri: lb://PEDIDO-SERVICE
              predicates:
                - Path=/api/pedidos/**

            # PAGO SERVICE
            - id: pago-service
              uri: lb://PAGO-SERVICE
              predicates:
                - Path=/api/pagos/**

            # ENTREGA SERVICE
            - id: entrega-service
              uri: lb://ENTREGA-SERVICE
              predicates:
                - Path=/api/entregas/**

            # HISTORIAL SERVICE
            - id: historial-service
              uri: lb://HISTORIAL-SERVICE
              predicates:
                - Path=/api/historial/**

            # NOTIFICACION SERVICE
            - id: notificacion-service
              uri: lb://NOTIFICACION-SERVICE
              predicates:
                - Path=/api/notificaciones/**

            # REPARTIDOR SERVICE
            - id: repartidor-service
              uri: lb://REPARTIDOR-SERVICE
              predicates:
                - Path=/api/repartidores/**


            # CATEGORIA SERVICE
            - id: categoria-service
              uri: lb://CATEGORIA-SERVICE
              predicates:
                - Path=/api/categorias/**

            # SUCURSAL SERVICE
            - id: sucursal-service
              uri: lb://SUCURSAL-SERVICE
              predicates:
                - Path=/api/sucursales/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/