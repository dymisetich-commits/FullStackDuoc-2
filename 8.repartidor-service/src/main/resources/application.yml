server:
  port: 8088

spring:
  application:
    name: repartidor-service

  datasource:
    # Crea 'repartidor_db' de forma automática en XAMPP y remueve advertencias
    url: jdbc:mysql://localhost:3306/repartidor_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago
    username: root
    password: 

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    # Activa la visualización ordenada de las consultas en la consola
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  # Registra el microservicio en Eureka usando su dirección IP
  instance:
    prefer-ip-address: true

